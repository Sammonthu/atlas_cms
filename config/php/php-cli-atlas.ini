; Definit une configuration PHP locale dediee au projet Atlas CMS.
[PHP]
; Definit le repertoire absolu des extensions PHP Windows.
extension_dir="C:/Program Files/PHP/ext"
; Active l'extension PDO MySQL requise par Doctrine.
extension=pdo_mysql
; Active l'extension mysqli pour les outils MySQL eventuels.
extension=mysqli
; Active l'extension Intl requise par EasyAdmin pour le formatage des dates.
extension=intl
; Definit le fuseau horaire PHP pour eviter les warnings de date.
date.timezone="Europe/Paris"
; Active l'affichage d'erreurs en dev.
display_errors=1
; Active l'affichage des erreurs de demarrage en dev.
display_startup_errors=1
; Evite le bruit massif des deprecations PHP 8.5 dans Symfony 7.2 en environnement local.
error_reporting=E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED
; Etend le delai max d'execution pour eviter les timeouts lors des premieres requetes dev.
max_execution_time=120
