; Définit une configuration PHP locale dédiée au projet Atlas CMS.
[PHP]
; Définit le répertoire absolu des extensions PHP Windows.
extension_dir="C:/Program Files/PHP/ext"
; Active l'extension PDO MySQL requise par Doctrine.
extension=pdo_mysql
; Active l'extension mysqli pour les outils MySQL éventuels.
extension=mysqli
; Active l'extension Intl requise par EasyAdmin pour le formatage des dates.
extension=intl
; Définit le fuseau horaire PHP pour éviter les warnings de date.
date.timezone="Europe/Paris"
